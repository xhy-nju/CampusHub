spring:
  application:
    name: campushub-backend
  profiles:
    default: local
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:5432}/${POSTGRES_DB:campushub}
    username: ${POSTGRES_USER:campushub}
    password: ${POSTGRES_PASSWORD:campushub_dev_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: -1
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

campushub:
  jwt:
    secret: ${JWT_SECRET:campushub-dev-secret-change-me-at-least-32-characters}
    expires-in-seconds: ${JWT_EXPIRES_IN:86400}

logging:
  level:
    com.campushub: INFO
